<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f7fa;
}

.login-box{
    max-width:500px;
    margin:100px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:25px;
}
</style>

</head>
<body>

<div class="login-box">

    <h2>Admin Login</h2>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            class="form-control mb-3"
            placeholder="Enter Email"
            required
        >

        <input
            type="password"
            id="password"
            class="form-control mb-3"
            placeholder="Enter Password"
            required
        >

        <button
            type="submit"
            class="btn btn-primary w-100">
            Login
        </button>

    </form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCawNBZMV3mV_s-ZgBfEkNzJlh6G74k9xs",
  authDomain: "ayush-service-center.firebaseapp.com",
  projectId: "ayush-service-center",
  storageBucket: "ayush-service-center.firebasestorage.app",
  messagingSenderId: "720883452589",
  appId: "1:720883452589:web:c0ebb799460cb06654d424",
  measurementId: "G-Y7HHVQHYM4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document
.getElementById("loginForm")
.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    try{

        await signInWithEmailAndPassword(
            auth,
            email,
            password
        );

        alert("Login Successful");

        window.location.href =
        "dashboard.html";

    }
    catch(error){

        alert(error.message);

    }

});

</script>

</body>
</html>
