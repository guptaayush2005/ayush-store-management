<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Product</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f7fa;
}

.card{
    max-width:700px;
    margin:40px auto;
    border:none;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.1);
}
</style>

</head>
<body>

<div class="container">

<div class="card p-4">

<h2 class="text-center mb-4">
➕ Add Product
</h2>

<form id="productForm">

<input
type="text"
id="name"
class="form-control mb-3"
placeholder="Product Name"
required>

<input
type="number"
id="price"
class="form-control mb-3"
placeholder="Price"
required>

<input
type="text"
id="image"
class="form-control mb-3"
placeholder="Image URL"
required>
<select
id="category"
class="form-select mb-3">

<option value="Steel">Steel</option>
<option value="Mobile">Mobile</option>
<option value="Plastic">Plastic</option>
<option value="Gas">Gas Items</option>
<option value="Cold Drink">Cold Drink</option>
<option value="Dona Pattal">Dona Pattal</option>

</select>

<select
id="stock"
class="form-select mb-3">

<option value="Available">
Available
</option>

<option value="Out of Stock">
Out Of Stock
</option>

</select>

<button
type="submit"
class="btn btn-success w-100">

Save Product

</button>

</form>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCawNBZMV3mV_s-ZgBfEkNzJlh6G74k9xs",
  authDomain: "ayush-service-center.firebaseapp.com",
  projectId: "ayush-service-center",
  storageBucket: "ayush-service-center.firebasestorage.app",
  messagingSenderId: "720883452589",
  appId: "1:720883452589:web:c0ebb799460cb06654d424"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document
.getElementById("productForm")
.addEventListener("submit", async (e)=>{

e.preventDefault();

const name =
document.getElementById("name").value;

const price =
Number(document.getElementById("price").value);

const image =
document.getElementById("image").value;

const category =
document.getElementById("category").value;

const stock =
document.getElementById("stock").value;

try{

await addDoc(
collection(db,"products"),
{
name,
price,
image,
category,
stock
}
);

alert("Product Added Successfully");

document.getElementById("productForm").reset();

}
catch(error){

alert(error.message);

}

});

</script>

</body>
</html>
