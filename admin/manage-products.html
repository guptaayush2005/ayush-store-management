<!DOCTYPE html>
<html>
<head>
    <title>Manage Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Manage Products</h2>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="productTable"></tbody>
    </table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    deleteDoc,
    updateDoc,
    doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCawNBZMV3mV_s-ZgBfEkNzJlh6G74k9xs",
  authDomain: "ayush-service-center.firebaseapp.com",
  projectId: "ayush-service-center",
  storageBucket: "ayush-service-center.firebasestorage.app",
  messagingSenderId: "720883452589",
  appId: "1:720883452589:web:c0ebb799460cb06654d424"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const table = document.getElementById("productTable");

async function loadProducts() {

    table.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "products"));

    querySnapshot.forEach((document) => {

        const product = document.data();

        table.innerHTML += `
        <tr>

            <td>
                <img src="../${product.image}" width="70">
            </td>

            <td>${product.name}</td>

            <td>₹${product.price}</td>

            <td>${product.stock}</td>

            <td>

                <button
                    class="btn btn-warning btn-sm me-2"
                    onclick="editProduct('${document.id}','${product.name}','${product.price}')">
                    Edit
                </button>

                <button
                    class="btn btn-danger btn-sm"
                    onclick="deleteProduct('${document.id}')">
                    Delete
                </button>

            </td>

        </tr>
        `;
    });
}

window.editProduct = async function(id,name,price){

    const newName = prompt("Enter Product Name", name);

    const newPrice = prompt("Enter Product Price", price);

    if(newName && newPrice){

        await updateDoc(
            doc(db,"products",id),
            {
                name:newName,
                price:Number(newPrice)
            }
        );

        alert("Product Updated Successfully");

        loadProducts();
    }
}

window.deleteProduct = async function(id){

    const confirmDelete = confirm("Delete this product?");

    if(confirmDelete){

        await deleteDoc(doc(db, "products", id));

        alert("Product Deleted Successfully");

        loadProducts();
    }
}

loadProducts();

</script>

</body>
</html>
