
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Reviews</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container py-5">

<h2 class="text-center mb-4">
⭐ Manage Reviews
</h2>

<div id="reviewsContainer"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCawNBZMV3mV_s-ZgBfEkNzJlh6G74k9xs",
  authDomain: "ayush-service-center.firebaseapp.com",
  projectId: "ayush-service-center",
  storageBucket: "ayush-service-center.firebasestorage.app",
  messagingSenderId: "720883452589",
  appId: "1:720883452589:web:c0ebb799460cb06654d424"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const reviewsContainer =
document.getElementById("reviewsContainer");

async function loadReviews(){

reviewsContainer.innerHTML = "";

const snapshot =
await getDocs(collection(db,"reviews"));

snapshot.forEach((reviewDoc)=>{

const review = reviewDoc.data();

reviewsContainer.innerHTML += `

<div class="card p-4 mb-3 shadow-sm">

<h5>${review.rating}</h5>

<p>${review.review}</p>

<b>${review.name}</b>

<br><br>

<button
class="btn btn-danger"
onclick="deleteReview('${reviewDoc.id}')">

Delete Review

</button>

</div>

`;

});

}

window.deleteReview = async function(id){

const confirmDelete =
confirm("Delete this review?");

if(confirmDelete){

await deleteDoc(
doc(db,"reviews",id)
);

alert("Review Deleted");

loadReviews();

}

}

loadReviews();

</script>

</body>
</html>
