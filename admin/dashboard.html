<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fa;
}

.dashboard-box{
    max-width:700px;
    margin:50px auto;
}

</style>

</head>
<body>

<div class="container">

<div class="dashboard-box">

<h2 class="text-center mb-4">
⚙️ Admin Dashboard
</h2>

<div class="d-grid gap-3">

<a href="add-product.html"
class="btn btn-success btn-lg py-3">

➕ Add Product

</a>

<a href="manage-products.html"
class="btn btn-primary btn-lg py-3">

📦 Manage Products

</a>

<a href="admin-reviews.html"
class="btn btn-warning btn-lg py-3">

⭐ Manage Reviews

</a>

<button
class="btn btn-danger btn-lg py-3"
onclick="logout()">

🚪 Logout

</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCawNBZMV3mV_s-ZgBfEkNzJlh6G74k9xs",
  authDomain: "ayush-service-center.firebaseapp.com",
  projectId: "ayush-service-center",
  storageBucket: "ayush-service-center.firebasestorage.app",
  messagingSenderId: "720883452589",
  appId: "1:720883452589:web:c0ebb799460cb06654d424"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {

    if (!user) {

        window.location.href = "login.html";

    }

});

window.logout = async function(){

    await signOut(auth);

    alert("Logged Out Successfully");

    window.location.href = "login.html";

}

</script>

</body>
</html>
