
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reviews - Ayush Service Center</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f8f5ef;
}

.review-card{
border:none;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

</style>

</head>
<body>

<div class="container py-5">

<h1 class="text-center mb-5">
⭐ Customer Reviews
</h1>

<div id="reviewsContainer"></div>

<hr class="my-5">

<h2 class="mb-4">
⭐ Give Your Review
</h2>

<form id="reviewForm">

<div class="mb-3">
<label class="form-label">Your Name</label>
<input
type="text"
id="name"
class="form-control"
placeholder="Enter your name"
required>
</div>

<div class="mb-3">
<label class="form-label">Rating</label>
<select id="rating" class="form-select">
<option>⭐⭐⭐⭐⭐ 5 Star</option>
<option>⭐⭐⭐⭐ 4 Star</option>
<option>⭐⭐⭐ 3 Star</option>
<option>⭐⭐ 2 Star</option>
<option>⭐ 1 Star</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Your Review</label>
<textarea
id="review"
class="form-control"
rows="4"
placeholder="Write your review here"
required></textarea>
</div>

<button type="submit" class="btn btn-warning btn-lg">
⭐ Submit Review
</button>

</form>

<div class="mt-5">
<a href="index.html" class="btn btn-primary btn-lg">
🏠 Back to Home
</a>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCawNBZMV3mV_s-ZgBfEkNzJlh6G74k9xs",
  authDomain: "ayush-service-center.firebaseapp.com",
  projectId: "ayush-service-center",
  storageBucket: "ayush-service-center.firebasestorage.app",
  messagingSenderId: "720883452589",
  appId: "1:720883452589:web:c0ebb799460cb06654d424"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const reviewsContainer =
document.getElementById("reviewsContainer");

async function loadReviews(){

reviewsContainer.innerHTML = "";

const snapshot =
await getDocs(collection(db,"reviews"));

snapshot.forEach((doc)=>{

const review = doc.data();

reviewsContainer.innerHTML += `

<div class="card review-card p-4 mb-4">

<h5>${review.rating}</h5>

<p>${review.review}</p>

<b>- ${review.name}</b>

</div>

`;

});

}

document
.getElementById("reviewForm")
.addEventListener("submit", async(e)=>{

e.preventDefault();

const name =
document.getElementById("name").value;

const rating =
document.getElementById("rating").value;

const review =
document.getElementById("review").value;

await addDoc(
collection(db,"reviews"),
{
name,
rating,
review,
createdAt: Date.now()
}
);

alert("Review Submitted Successfully");

document
.getElementById("reviewForm")
.reset();

loadReviews();

});

loadReviews();

</script>

</body>
</html>
