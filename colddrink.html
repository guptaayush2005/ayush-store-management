<!DOCTYPE html>

<body>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCawNBZMV3mV_s-ZgBfEkNzJlh6G74k9xs",
  authDomain: "ayush-service-center.firebaseapp.com",
  projectId: "ayush-service-center",

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const coldDrinkProducts =
document.getElementById("coldDrinkProducts");

async function loadProducts(){

const querySnapshot =
await getDocs(collection(db,"products"));

coldDrinkProducts.innerHTML = "";

querySnapshot.forEach((doc)=>{

const product = doc.data();

if(product.category === "Cold Drink"){

coldDrinkProducts.innerHTML += `

<div class="col-md-4">

<div class="card shadow-sm h-100">

<img src="${product.image}"
class="card-img-top"
style="height:250px;object-fit:cover;">

<div class="card-body text-center">

<h5>${product.name}</h5>

<p class="fw-bold text-success">
₹${product.price}
</p>

<p>${product.stock}</p>

<a href="https://wa.me/919616932589?text=Hello%20I%20want%20to%20order%20${product.name}"
class="btn btn-success">
Order on WhatsApp
</a>

</div>

</div>

</div>

`;

}

});

}

loadProducts();

</script>
